<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c0392b">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Menta5deer">
    <link rel="apple-touch-icon" href="icon.png">

    <title>Menta5deer</title>
    <style>
        :root { --primary: #c0392b; --accent: #27ae60; --bg: #f8f9fa; --white: #ffffff; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .container { background: var(--white); padding: 2rem; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 13px; margin-bottom: 20px; background: #f1f2f6; color: #57606f; font-weight: bold; }
        .main-trigger { width: 100%; padding: 25px; background-color: var(--primary); color: white; border: none; border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #962d22; transition: all 0.1s; margin-bottom: 25px; }
        .main-trigger:active { transform: translateY(4px); box-shadow: 0 4px 0 #962d22; }
        .input-group { margin-bottom: 20px; text-align: right; border-top: 1px solid #eee; padding-top: 15px; }
        label { display: block; font-size: 14px; color: #7f8c8d; margin-bottom: 8px; }
        select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: #fff; cursor: pointer; }
        #result { margin-top: 10px; text-align: right; }
        .contact-card { background: #fff; border: 1px solid #edf2f7; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .contact-info b { display: block; color: #2d3436; font-size: 18px; }
        .contact-info span { font-family: monospace; color: #636e72; font-size: 15px; }
        .actions { display: flex; gap: 5px; }
        .btn-sm { padding: 8px 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-copy { background: #dfe6e9; color: #2d3436; }
        .btn-call { background: #2ecc71; color: white; }
        .btn-wa { background: var(--whatsapp); color: white; }
        .footer-note { margin-top: 20px; font-size: 11px; color: #95a5a6; text-align: center; line-height: 1.6; }
        .footer-note a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="timeStatus" class="status-badge">جاري التحديث...</div>
    <button class="main-trigger" onclick="processRequest()">مين تخدير؟</button>
    <div class="input-group">
        <label>استعلام عن يوم آخر:</label>
        <select id="daySelect" onchange="processRequest()">
            <option value="today">الوقت الحالي</option>
            <option value="السبت">السبت</option>
            <option value="الأحد">الأحد</option>
            <option value="الاثنين">الاتنين</option>
            <option value="الثلاثاء">التلات</option>
            <option value="الأربعاء">الأربع</option>
            <option value="الخميس">الخميس</option>
            <option value="الجمعة">الجمعة</option>
        </select>
    </div>
    <div id="result"></div>
</div>

<div class="footer-note">
    Made by Dr. Abdow • Menta5deer v1.3.4 <br>
    <a href="https://wa.me/201550086024" target="_blank">Send Feedback via WhatsApp</a>
</div>

<script>
    const directory = {
        "محمود عزت": "01024772356", "حسام": "01287993774", "محمد فؤاد": "01020274239",
        "أحمد طارق": "01022176649", "عبدالغني": "01123676274", "محمد هراس": "01021681919",
        "سارة فايد": "01147341375", "سلمى": "01286443285", "عمر الحيت": "01092832062",
        "جهاد": "01010799643", "أحمد الفار": "01019202321", "أحمد عيسى": "01026512389",
        "آية جمال": "01159716507", "نهاد": "01022187178", "روان": "01091051651"
    };

    const emergencyMornings = {
        "السبت": ["أحمد الفار"], "الأحد": ["سلمى"], "الاثنين": ["محمود عزت"],
        "الثلاثاء": ["آية جمال"], "الأربعاء": ["جهاد"], "الخميس": ["عمر الحيت"]
    };

    const groupSunWed = ["محمد هراس", "عمر الحيت", "جهاد", "سلمى", "سارة فايد"];
    const groupMonThu = ["حسام", "أحمد طارق", "عبدالغني", "محمود عزت", "محمد فؤاد"];
    const groupSatTue = ["نهاد", "أحمد الفار", "أحمد عيسى", "روان", "آية جمال"];

    const onCallGroups = {
        "السبت": groupSatTue, "الثلاثاء": groupSatTue,
        "الأحد": groupSunWed, "الأربعاء": groupSunWed,
        "الاثنين": groupMonThu, "الخميس": groupMonThu
    };

    const rotationCycle = ["الأحد", "الاثنين", "السبت"];

    function getFridayGroup(date) {
        const refDate = new Date(2026, 0, 30); 
        const diffTime = date.getTime() - refDate.getTime();
        const diffWeeks = Math.floor(diffTime / (7 * 24 * 60 * 60 * 1000));
        let index = diffWeeks % 3;
        if (index < 0) index += 3;
        return onCallGroups[rotationCycle[index]];
    }

    // Fixed Time Function: Calculates precise decimal time
    function getPreciseHour() {
        const d = new Date();
        return d.getHours() + (d.getMinutes() / 60);
    }

    function updateTimeDisplay() {
        const now = new Date();
        const hr = getPreciseHour();
        let status = "";
        
        if (hr < 8) {
            status = "🌑 نبطشية (مستمرة من أمس)";
        } else if (hr >= 8 && hr < 13.5 && now.getDay() !== 5) {
            status = "☀️ فترة العمل الصباحية";
        } else {
            status = "🌑 فترة النبطشية";
        }
        document.getElementById('timeStatus').innerText = status;
    }
    setInterval(updateTimeDisplay, 30000); // Check every 30 seconds
    updateTimeDisplay();

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text);
        const originalText = btn.innerText; btn.innerText = "تم!";
        setTimeout(() => { btn.innerText = originalText; }, 1500);
    }

    function processRequest() {
        const selectedDay = document.getElementById('daySelect').value;
        const daysArr = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const now = new Date();
        const hr = getPreciseHour();

        let effectiveDate = new Date(now);
        if (hr < 8) effectiveDate.setDate(now.getDate() - 1);

        let finalNames = [];

        if (selectedDay === "today") {
            const dayIdx = effectiveDate.getDay();
            const dayName = daysArr[dayIdx];

            if (dayIdx === 5) {
                finalNames = getFridayGroup(effectiveDate);
            } else {
                // If precise hour is 13.5 or more, it's On-Call time.
                const isMorningSlot = (hr >= 8 && hr < 13.5);
                finalNames = isMorningSlot ? (emergencyMornings[dayName] || []) : (onCallGroups[dayName] || []);
            }
        } 
        else if (selectedDay === "الجمعة") {
            let targetFri = new Date(effectiveDate);
            targetFri.setDate(effectiveDate.getDate() + (5 + 7 - effectiveDate.getDay()) % 7);
            finalNames = getFridayGroup(targetFri);
        } 
        else {
            const keyMap = { "السبت": "السبت", "الأحد": "الأحد", "الاثنين": "الاثنين", "الاتنين": "الاثنين", "التلات": "الثلاثاء", "الثلاثاء": "الثلاثاء", "الأربعاء": "الأربعاء", "الأربع": "الأربعاء", "الخميس": "الخميس" };
            const key = keyMap[selectedDay] || selectedDay;
            finalNames = [...(emergencyMornings[key] || []), ...(onCallGroups[key] || [])];
        }

        // Keep the exception for Jan 30
        const isTodayShift = effectiveDate.getFullYear() === 2026 && 
                             effectiveDate.getMonth() === 0 && 
                             effectiveDate.getDate() === 30;
        
        if (isTodayShift) {
            finalNames = finalNames.filter(name => name !== "محمد هراس");
        }

        renderList(finalNames);
    }

    function renderList(names) {
        const resultDiv = document.getElementById('result');
        if (!names || names.length === 0) { resultDiv.innerHTML = `<div class="empty-msg">لا يوجد جدول مسجل</div>`; return; }
        
        // Remove duplicates
        let uniqueNames = [...new Set(names)];
        
        // Shuffle the array randomly to distribute calls evenly
        for (let i = uniqueNames.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [uniqueNames[i], uniqueNames[j]] = [uniqueNames[j], uniqueNames[i]];
        }

        let html = "";
        uniqueNames.forEach(n => {
            const phone = directory[n] || "";
            html += `<div class="contact-card"><div class="contact-info"><b>${n}</b><span>${phone}</span></div><div class="actions">
                <button class="btn-sm btn-copy" onclick="copyToClipboard('${phone}', this)">نسخ</button>
                ${phone ? `<a href="https://wa.me/2${phone}" target="_blank" class="btn-sm btn-wa">واتساب</a>` : ''}
                ${phone ? `<a href="tel:${phone}" class="btn-sm btn-call">اتصال</a>` : ''}
            </div></div>`;
        });
        resultDiv.innerHTML = html;
    }

    processRequest();
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); }); }
</script>
</body>
</html>
